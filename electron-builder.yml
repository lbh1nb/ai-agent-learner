appId: com.ai-coding-learner
productName: AI Coding Learner
directories:
  buildResources: build
  output: release
files:
  - dist
  - dist-electron
  - resources
win:
  target:
    - target: portable
      arch:
        - x64
    - target: zip
      arch:
        - x64
  sign: null
  signAndEditExecutable: false
mac:
  target:
    - dmg
linux:
  target:
    - AppImage
asar:
  smartUnpack: false
asarUnpack:
  - "**/*.node"
  - "**/better-sqlite3/**"