appId: com.ai-coding-learner
productName: AI Coding Learner
directories:
  buildResources: build
  output: release
files:
  - dist
  - dist-electron
  - resources
win:
  target:
    - nsis
  icon: build/icon.ico
mac:
  target:
    - dmg
  icon: build/icon.icns
linux:
  target:
    - AppImage
  icon: build/icon.png
asar:
  smartUnpack: false
asarUnpack:
  - "**/*.node"
  - "**/better-sqlite3/**"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true